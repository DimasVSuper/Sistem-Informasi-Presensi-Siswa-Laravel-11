$kind: http-request
url: "{{base_url}}/api/presensi"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "qr_code": "QR-API-DUP"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 409', function () {
          pm.response.to.have.status(409);
      });
      const jsonData = pm.response.json();
      pm.test('Success boolean false', function () {
          pm.expect(jsonData.success).to.eql(false);
      });
      pm.test('Message indicates duplicate scan', function () {
          pm.expect(jsonData.message).to.include('sudah melakukan presensi hari ini');
      });
order: 3000
